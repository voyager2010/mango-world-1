<!DOCTYPE html>
<html>

<head>
    
    <title>Sign Up Page</title>
    <style>
    
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .signup-box {
            background: white;
            width: 380px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .signup-box h1 {
            margin-bottom: 20px;
            color: #032304;
        }

        .input-box {
            margin: 15px 0;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background: rgb(188, 175, 30);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .signup-btn:hover {
            background: rgb(150, 140, 20);
        }

        .extra-text {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra-text a {
            color: #2e7d32;
            text-decoration: none;
        }

        .extra-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="signup-box">
        <h1>Sign Up 🥭</h1>
        <form>
            <div class="input-box"> <input type="text" placeholder="Enter Full Name"> </div>
            <div class="input-box"> <input type="email" placeholder="Enter Email"> </div>
            <div class="input-box"> <input type="password" placeholder="Create Password"> </div>
            <div class="input-box"> <input type="password" placeholder="Confirm Password"> </div> 
            <button type="submit" class="signup-btn">Create Account</button>
        </form>
      
    </div>
</body>

</html>
