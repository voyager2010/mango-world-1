<!DOCTYPE html>
<html>
<head>

<title>Login Page</title>

<style>


body {
    font-family: Arial, sans-serif;
    background: #f1eded;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    width: 350px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h1 {
    margin-bottom: 20px;
    color: #032304;
}

.input-box {
    margin: 15px 0;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 15px;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: rgb(188, 175, 30);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.login-btn:hover {
    background: rgb(150, 140, 20);
}

.extra-text {
    margin-top: 15px;
    font-size: 14px;
}

.extra-text a {
    color: #2e7d32;
    text-decoration: none;
}

.extra-text a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-box">
    <h1>Login 🥭</h1>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Enter Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

</div>

</body>
</html>
